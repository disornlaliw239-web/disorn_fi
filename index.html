<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกค่าใช้จ่าย 5 หมวดหมู่</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Tahoma', sans-serif; padding: 20px; }
        .category-card { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 25px; border: none; transition: 0.3s; }
        .category-card:hover { transform: translateY(-5px); }
        
        /* สีแยกตามหมวดหมู่ */
        .head-electric { background: #ffc107; color: #000; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .head-water { background: #0dcaf0; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .head-water-meter { background: #0d6efd; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .head-trash { background: #198754; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .head-shop { background: #6f42c1; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }

        .history-box { max-height: 250px; overflow-y: auto; background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 10px; margin-top: 15px; }
        .bill-item { background: white; border-bottom: 1px solid #f1f1f1; padding: 10px; position: relative; font-size: 0.85rem; }
        .preview-img { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; margin-top: 5px; display: none; border: 1px solid #ddd; }
        .thumb-img { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; float: right; cursor: pointer; border: 1px solid #eee; }
        .btn-save { font-weight: bold; }
    </style>
</head>
<body>

<div class="container-fluid">
    <h3 class="text-center mb-4">🏠 บันทึกค่าใช้จ่ายและหนี้สินประจำบ้าน</h3>

    <div class="row g-3">
        <div class="col-md-4 col-lg-2.4">
            <div class="card category-card">
                <div class="card-header head-electric d-flex justify-content-between align-items-center">
                    <span>⚡ ไฟฟ้า</span>
                    <button class="btn btn-danger btn-sm p-0 px-1" onclick="clearCategory('electric')">ล้าง</button>
                </div>
                <div class="card-body p-3">
                    <form onsubmit="saveData(event, 'electric')">
                        <input type="month" class="form-control form-control-sm mb-2" id="el-date" required>
                        <div class="input-group input-group-sm mb-2">
                            <input type="number" class="form-control" id="el-unit" placeholder="หน่วยที่ใช้" required>
                            <input type="text" class="form-control w-25" id="el-label" value="หน่วย">
                        </div>
                        <input type="number" step="0.01" class="form-control form-control-sm mb-2" id="el-price" placeholder="ราคา (บาท)" required>
                        <input type="file" class="form-control form-control-sm mb-1" id="el-img" accept="image/*" onchange="preview(this, 'el-p')">
                        <img id="el-p" class="preview-img">
                        <button type="submit" class="btn btn-warning btn-sm w-100 btn-save">บันทึก</button>
                    </form>
                    <div id="list-electric" class="history-box"></div>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-2.4">
            <div class="card category-card">
                <div class="card-header head-water d-flex justify-content-between align-items-center">
                    <span>💧 น้ำประปา</span>
                    <button class="btn btn-danger btn-sm p-0 px-1" onclick="clearCategory('water')">ล้าง</button>
                </div>
                <div class="card-body p-3">
                    <form onsubmit="saveData(event, 'water')">
                        <input type="month" class="form-control form-control-sm mb-2" id="wa-date" required>
                        <div class="input-group input-group-sm mb-2">
                            <input type="number" class="form-control" id="wa-unit" placeholder="จำนวน" required>
                            <input type="text" class="form-control w-25" id="wa-label" value="ลบ.ม.">
                        </div>
                        <input type="number" step="0.01" class="form-control form-control-sm mb-2" id="wa-price" placeholder="ราคา (บาท)" required>
                        <input type="file" class="form-control form-control-sm mb-1" id="wa-img" accept="image/*" onchange="preview(this, 'wa-p')">
                        <img id="wa-p" class="preview-img">
                        <button type="submit" class="btn btn-info text-white btn-sm w-100 btn-save">บันทึก</button>
                    </form>
                    <div id="list-water" class="history-box"></div>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-2.4">
            <div class="card category-card">
                <div class="card-header head-water-meter d-flex justify-content-between align-items-center">
                    <span>📏 มิเตอร์น้ำ</span>
                    <button class="btn btn-danger btn-sm p-0 px-1" onclick="clearCategory('watermeter')">ล้าง</button>
                </div>
                <div class="card-body p-3">
                    <form onsubmit="saveData(event, 'watermeter')">
                        <input type="month" class="form-control form-control-sm mb-2" id="wm-date" required>
                        <div class="input-group input-group-sm mb-2">
                            <input type="number" class="form-control" id="wm-unit" placeholder="เลขมิเตอร์" required>
                            <input type="text" class="form-control w-25" id="wm-label" value="เลข">
                        </div>
                        <input type="number" step="0.01" class="form-control form-control-sm mb-2" id="wm-price" placeholder="ราคา (บาท)" required>
                        <input type="file" class="form-control form-control-sm mb-1" id="wm-img" accept="image/*" onchange="preview(this, 'wm-p')">
                        <img id="wm-p" class="preview-img">
                        <button type="submit" class="btn btn-primary btn-sm w-100 btn-save">บันทึก</button>
                    </form>
                    <div id="list-watermeter" class="history-box"></div>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-2.4">
            <div class="card category-card">
                <div class="card-header head-trash d-flex justify-content-between align-items-center">
                    <span>🗑️ ค่าขยะ</span>
                    <button class="btn btn-danger btn-sm p-0 px-1" onclick="clearCategory('trash')">ล้าง</button>
                </div>
                <div class="card-body p-3">
                    <form onsubmit="saveData(event, 'trash')">
                        <input type="month" class="form-control form-control-sm mb-2" id="tr-date" required>
                        <div class="input-group input-group-sm mb-2">
                            <input type="number" class="form-control" id="tr-unit" placeholder="จำนวน" value="1" required>
                            <input type="text" class="form-control w-25" id="tr-label" value="เดือน">
                        </div>
                        <input type="number" step="0.01" class="form-control form-control-sm mb-2" id="tr-price" placeholder="ราคา (บาท)" required>
                        <input type="file" class="form-control form-control-sm mb-1" id="tr-img" accept="image/*" onchange="preview(this, 'tr-p')">
                        <img id="tr-p" class="preview-img">
                        <button type="submit" class="btn btn-success btn-sm w-100 btn-save">บันทึก</button>
                    </form>
                    <div id="list-trash" class="history-box"></div>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-2.4">
            <div class="card category-card">
                <div class="card-header head-shop d-flex justify-content-between align-items-center">
                    <span>🛒 ร้านค้า</span>
                    <button class="btn btn-danger btn-sm p-0 px-1" onclick="clearCategory('shop')">ล้าง</button>
                </div>
                <div class="card-body p-3">
                    <form onsubmit="saveData(event, 'shop')">
                        <input type="date" class="form-control form-control-sm mb-2" id="sh-date" required>
                        <div class="input-group input-group-sm mb-2">
                            <input type="text" class="form-control" id="sh-unit" placeholder="ชื่อสินค้า/รายการ" required>
                            <input type="text" class="form-control w-25" id="sh-label" value="ชิ้น">
                        </div>
                        <input type="number" step="0.01" class="form-control form-control-sm mb-2" id="sh-price" placeholder="ราคา (บาท)" required>
                        <input type="file" class="form-control form-control-sm mb-1" id="sh-img" accept="image/*" onchange="preview(this, 'sh-p')">
                        <img id="sh-p" class="preview-img">
                        <button type="submit" class="btn btn-secondary btn-sm w-100 btn-save">บันทึก</button>
                    </form>
                    <div id="list-shop" class="history-box"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const categories = ['electric', 'water', 'watermeter', 'trash', 'shop'];

    function preview(input, imgId) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById(imgId).src = e.target.result;
            document.getElementById(imgId).style.display = 'block';
        };
        if(file) reader.readAsDataURL(file);
    }

    function saveData(event, type) {
        event.preventDefault();
        let prefix = type === 'electric' ? 'el' : (type === 'water' ? 'wa' : (type === 'watermeter' ? 'wm' : (type === 'trash' ? 'tr' : 'sh')));
        
        const newItem = {
            id: Date.now(),
            time: document.getElementById(`${prefix}-date`).value,
            unit: document.getElementById(`${prefix}-unit`).value,
            label: document.getElementById(`${prefix}-label`).value,
            price: document.getElementById(`${prefix}-price`).value,
            image: document.getElementById(`${prefix}-p`).src || null
        };

        const existingData = JSON.parse(localStorage.getItem(`data_${type}`)) || [];
        existingData.unshift(newItem);
        localStorage.setItem(`data_${type}`, JSON.stringify(existingData));
        
        event.target.reset();
        document.getElementById(`${prefix}-p`).style.display = 'none';
        document.getElementById(`${prefix}-p`).src = '';
        renderList(type);
    }

    function renderList(type) {
        const listDiv = document.getElementById(`list-${type}`);
        const data = JSON.parse(localStorage.getItem(`data_${type}`)) || [];
        listDiv.innerHTML = data.length === 0 ? '<p class="text-center text-muted" style="font-size:0.7rem;">ยังไม่มีข้อมูล</p>' : '';
        
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'bill-item';
            div.innerHTML = `
                ${item.image && item.image.length > 50 ? `<img src="${item.image}" class="thumb-img" onclick="window.open(this.src)">` : ''}
                <strong>📅 ${item.time}</strong><br>
                ${item.unit} ${item.label}<br>
                <span class="text-primary font-weight-bold">${parseFloat(item.price).toLocaleString()} บาท</span>
                <span class="text-danger ms-2" style="cursor:pointer" onclick="deleteSingle('${type}', ${item.id})">🗑️</span>
            `;
            listDiv.appendChild(div);
        });
    }

    function deleteSingle(type, id) {
        if(confirm('ลบรายการนี้ใช่หรือไม่?')) {
            let data = JSON.parse(localStorage.getItem(`data_${type}`));
            data = data.filter(i => i.id !== id);
            localStorage.setItem(`data_${type}`, JSON.stringify(data));
            renderList(type);
        }
    }

    function clearCategory(type) {
        if(confirm(`ล้างข้อมูลในหมวดนี้ทั้งหมดใช่หรือไม่?`)) {
            localStorage.removeItem(`data_${type}`);
            renderList(type);
        }
    }

    // Initialize
    categories.forEach(type => renderList(type));
</script>

</body>
</html>
