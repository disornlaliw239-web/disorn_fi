<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกค่าใช้จ่ายในครัวเรือน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Tahoma', 'Microsoft Sans Serif', sans-serif; padding: 20px; }
        .category-card { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 25px; border: none; }
        
        /* สีหัวข้อแต่ละหมวด */
        .head-electric { background: #ffc107; color: #000; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .head-water { background: #0dcaf0; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .head-water-meter { background: #0d6efd; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .head-trash { background: #198754; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .head-shop { background: #6f42c1; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        
        .history-box { max-height: 250px; overflow-y: auto; background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 10px; margin-top: 15px; }
        .bill-item { background: white; border-bottom: 1px solid #f1f1f1; padding: 10px; position: relative; font-size: 0.85rem; }
        .preview-img { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; margin-top: 5px; display: none; border: 1px solid #ddd; }
        .thumb-img { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; float: right; cursor: pointer; border: 1px solid #eee; }
        .file-limit-text { font-size: 0.7rem; color: #cc0000; font-weight: bold; }
        .form-label-custom { font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <h2 class="text-center mb-4">📝 ระบบบันทึกค่าใช้จ่าย (เมนูภาษาไทย)</h2>

    <div class="row g-3">
        <script>
            // การตั้งค่าหมวดหมู่และชื่อภาษาไทย
            const configs = [
                { id: 'electric', name: '⚡ ค่าไฟฟ้า', class: 'head-electric', prefix: 'el', unit: 'หน่วย', dateType: 'month' },
                { id: 'water', name: '💧 ค่าน้ำประปา', class: 'head-water', prefix: 'wa', unit: 'ลบ.ม.', dateType: 'month' },
                { id: 'watermeter', name: '📏 มิเตอร์น้ำ', class: 'head-water-meter', prefix: 'wm', unit: 'เลขมิเตอร์', dateType: 'month' },
                { id: 'trash', name: '🗑️ ค่าขยะ', class: 'head-trash', prefix: 'tr', unit: 'เดือน', dateType: 'month' },
                { id: 'shop', name: '🛒 ร้านค้า/ยอดค้าง', class: 'head-shop', prefix: 'sh', unit: 'รายการ', dateType: 'date' }
            ];

            // สร้างการ์ดแต่ละหมวดหมู่
            configs.forEach(conf => {
                document.write(`
                <div class="col-md-4 col-lg-2.4">
                    <div class="card category-card">
                        <div class="card-header ${conf.class} d-flex justify-content-between align-items-center">
                            <span>${conf.name}</span>
                            <button class="btn btn-danger btn-sm p-0 px-2" onclick="clearCategory('${conf.id}')" style="font-size: 0.7rem;">ล้างทั้งหมด</button>
                        </div>
                        <div class="card-body p-3">
                            <form onsubmit="saveData(event, '${conf.id}')">
                                <div class="mb-2">
                                    <label class="form-label-custom">วันที่/เดือน</label>
                                    <input type="${conf.dateType}" class="form-control form-control-sm" id="${conf.prefix}-date" required>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label-custom">รายละเอียดหน่วย</label>
                                    <div class="input-group input-group-sm">
                                        <input type="text" class="form-control" id="${conf.prefix}-unit" placeholder="จำนวน" required>
                                        <input type="text" class="form-control w-25" id="${conf.prefix}-label" value="${conf.unit}" title="พิมพ์หน่วยเองได้">
                                    </div>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label-custom">จำนวนเงิน (บาท)</label>
                                    <input type="number" step="0.01" class="form-control form-control-sm" id="${conf.prefix}-price" placeholder="0.00" required>
                                </div>
                                <div class="mb-1">
                                    <label class="form-label-custom">แนบรูปภาพบิล</label>
                                    <input type="file" class="form-control form-control-sm" id="${conf.prefix}-img" accept="image/*" onchange="preview(this, '${conf.prefix}-p')">
                                    <span class="file-limit-text">* ไม่เกิน 10MB</span>
                                </div>
                                <img id="${conf.prefix}-p" class="preview-img">
                                <button type="submit" class="btn btn-dark btn-sm w-100 mt-2">💾 บันทึกข้อมูล</button>
                            </form>
                            <div class="mt-3"><strong>📜 ประวัติการบันทึก:</strong></div>
                            <div id="list-${conf.id}" class="history-box"></div>
                        </div>
                    </div>
                </div>`);
            });
        </script>
    </div>
</div>

<script>
    const categories = ['electric', 'water', 'watermeter', 'trash', 'shop'];

    // พรีวิวรูปและเช็คขนาดไฟล์ 10MB
    function preview(input, imgId) {
        const file = input.files[0];
        if (!file) return;

        const limit = 10 * 1024 * 1024; // 10 MB
        if (file.size > limit) {
            alert("❌ ไฟล์มีขนาดใหญ่เกินไป! เลือกรูปที่ขนาดน้อยกว่า 10 MB นะครับ");
            input.value = ""; 
            document.getElementById(imgId).src = "";
            document.getElementById(imgId).style.display = 'none';
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById(imgId).src = e.target.result;
            document.getElementById(imgId).style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    // บันทึกข้อมูลลงเครื่อง
    function saveData(event, type) {
        event.preventDefault();
        const conf = configs.find(c => c.id === type);
        const prefix = conf.prefix;
        
        const newItem = {
            id: Date.now(),
            time: document.getElementById(`${prefix}-date`).value,
            unit: document.getElementById(`${prefix}-unit`).value,
            label: document.getElementById(`${prefix}-label`).value,
            price: document.getElementById(`${prefix}-price`).value,
            image: document.getElementById(`${prefix}-p`).src || null,
            created: new Date().toLocaleString('th-TH')
        };

        const existingData = JSON.parse(localStorage.getItem(`data_${type}`)) || [];
        existingData.unshift(newItem);
        
        try {
            localStorage.setItem(`data_${type}`, JSON.stringify(existingData));
        } catch (e) {
            alert("❌ หน่วยความจำเต็ม! ลองลบรายการเก่าที่มีรูปภาพออกก่อนนะครับ");
            return;
        }
        
        event.target.reset();
        document.getElementById(`${prefix}-p`).style.display = 'none';
        document.getElementById(`${prefix}-p`).src = '';
        renderList(type);
    }

    // แสดงรายการข้อมูล
    function renderList(type) {
        const listDiv = document.getElementById(`list-${type}`);
        const data = JSON.parse(localStorage.getItem(`data_${type}`)) || [];
        listDiv.innerHTML = data.length === 0 ? '<p class="text-center text-muted" style="font-size:0.75rem;">ยังไม่มีข้อมูลบันทึก</p>' : '';
        
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'bill-item';
            div.innerHTML = `
                ${item.image && item.image.length > 50 ? `<img src="${item.image}" class="thumb-img" title="คลิกเพื่อดูรูปใหญ่" onclick="viewFullImage('${item.image}')">` : ''}
                <strong>📅 ${item.time}</strong><br>
                จำนวน: ${item.unit} ${item.label}<br>
                <span class="text-primary fw-bold">เงิน: ${parseFloat(item.price).toLocaleString()} บาท</span>
                <span class="text-danger ms-2" style="cursor:pointer" title="ลบรายการนี้" onclick="deleteSingle('${type}', ${item.id})">🗑️ ลบ</span>
            `;
            listDiv.appendChild(div);
        });
    }

    // ดูรูปภาพขนาดเต็ม
    function viewFullImage(src) {
        const win = window.open();
        win.document.write(`<title>รูปภาพหลักฐาน</title><body style="margin:0; background:#000; display:flex; justify-content:center; align-items:center;"><img src="${src}" style="max-width:100%; max-height:100vh;"></body>`);
    }

    // ลบทีละรายการ
    function deleteSingle(type, id) {
        if(confirm('ยืนยันว่าต้องการลบรายการนี้ใช่หรือไม่?')) {
            let data = JSON.parse(localStorage.getItem(`data_${type}`));
            data = data.filter(i => i.id !== id);
            localStorage.setItem(`data_${type}`, JSON.stringify(data));
            renderList(type);
        }
    }

    // ล้างหมวดหมู่ทั้งหมด
    function clearCategory(type) {
        const conf = configs.find(c => c.id === type);
        if(confirm(`⚠️ คุณแน่ใจไหม? ข้อมูล "${conf.name}" ทั้งหมดจะถูกลบถาวร!`)) {
            localStorage.removeItem(`data_${type}`);
            renderList(type);
        }
    }

    // โหลดข้อมูลขึ้นมาแสดงตอนเปิดหน้า
    categories.forEach(type => renderList(type));
</script>

</body>
</html>
